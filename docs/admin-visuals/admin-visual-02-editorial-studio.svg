<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">Admin Visual 02 Editorial Studio</title>
  <desc id="desc">Light editorial authoring studio for story metadata, chapter drafts, and live preview.</desc>
  <defs>
    <style>
      .bg{fill:#F5F7F9}
      .surface{fill:#FFFFFF;stroke:#D8DEE6;stroke-width:1}
      .soft{fill:#EDF2F6;stroke:#D8DEE6;stroke-width:1}
      .ink{fill:#162029}
      .muted{fill:#63717D}
      .blue{fill:#256D85}
      .coral{fill:#C9514C}
      .green{fill:#2F8C68}
      .label{font:600 12px Arial, sans-serif;fill:#63717D}
      .tiny{font:500 11px Arial, sans-serif;fill:#7A8792}
      .body{font:500 15px Arial, sans-serif;fill:#162029}
      .heading{font:800 30px Arial, sans-serif;fill:#162029}
      .subhead{font:700 18px Arial, sans-serif;fill:#162029}
      .mono{font:700 12px "Courier New", monospace;fill:#256D85}
      .line{stroke:#D8DEE6;stroke-width:1}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#66717A" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1440" height="960" class="bg"/>
  <rect x="32" y="32" width="1376" height="896" rx="28" fill="#FFFFFF" stroke="#D8DEE6"/>
  <rect x="32" y="32" width="104" height="896" rx="28" fill="#162029"/>
  <circle cx="84" cy="82" r="22" fill="#256D85"/>
  <rect x="62" y="150" width="44" height="44" rx="14" fill="#256D85"/>
  <rect x="62" y="214" width="44" height="44" rx="14" fill="#24313A"/>
  <rect x="62" y="278" width="44" height="44" rx="14" fill="#24313A"/>
  <rect x="62" y="342" width="44" height="44" rx="14" fill="#24313A"/>
  <rect x="62" y="406" width="44" height="44" rx="14" fill="#24313A"/>
  <circle cx="84" cy="858" r="22" fill="#C9514C"/>

  <text x="180" y="88" class="heading">Editorial studio</text>
  <text x="180" y="118" class="body" fill="#63717D">Compose metadata, chapter content, cover assets, and publish preview in one calm workspace.</text>
  <rect x="1044" y="62" width="130" height="42" rx="13" class="soft"/>
  <text x="1077" y="88" class="body">Save draft</text>
  <rect x="1192" y="62" width="156" height="42" rx="13" fill="#256D85"/>
  <text x="1226" y="88" font-family="Arial" font-size="15" font-weight="700" fill="#FFFFFF">Publish</text>

  <g filter="url(#shadow)">
    <rect x="180" y="156" width="390" height="724" rx="22" class="surface"/>
  </g>
  <text x="212" y="204" class="subhead">Story metadata</text>
  <text x="212" y="232" class="label">PUBLIC IDENTITY</text>
  <rect x="212" y="254" width="326" height="56" rx="12" class="soft"/>
  <text x="232" y="289" class="body">Vạn Cổ Thần Đế</text>
  <rect x="212" y="328" width="154" height="56" rx="12" class="soft"/>
  <text x="232" y="363" class="body">ongoing</text>
  <rect x="384" y="328" width="154" height="56" rx="12" class="soft"/>
  <text x="404" y="363" class="body">published</text>
  <text x="212" y="426" class="label">SYNOPSIS</text>
  <rect x="212" y="448" width="326" height="178" rx="14" class="soft"/>
  <text x="234" y="484" class="body">A measured text area for</text>
  <text x="234" y="510" class="body">long-form synopsis with</text>
  <text x="234" y="536" class="body">validation and preview.</text>
  <text x="212" y="668" class="label">COVER</text>
  <rect x="212" y="690" width="142" height="150" rx="16" fill="#E4EAF0" stroke="#D8DEE6"/>
  <rect x="234" y="716" width="98" height="98" rx="12" fill="#C9514C"/>
  <text x="382" y="726" class="body">story-covers/42/v3.webp</text>
  <text x="382" y="752" class="tiny">Admin-only upload bucket</text>
  <rect x="382" y="782" width="118" height="38" rx="12" fill="#162029"/>
  <text x="410" y="806" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">Replace</text>

  <g filter="url(#shadow)">
    <rect x="600" y="156" width="458" height="724" rx="22" class="surface"/>
  </g>
  <text x="632" y="204" class="subhead">Chapter workspace</text>
  <rect x="632" y="236" width="394" height="52" rx="14" fill="#162029"/>
  <text x="658" y="268" font-family="Arial" font-size="15" font-weight="700" fill="#FFFFFF">Chapter 21: Thiên môn mở lại</text>
  <text x="632" y="326" class="label">CONTENT BODY</text>
  <rect x="632" y="348" width="394" height="344" rx="16" fill="#F8FAFC" stroke="#D8DEE6"/>
  <text x="662" y="392" class="body">Plain text editor surface</text>
  <text x="662" y="422" class="body">with word count, autosave state,</text>
  <text x="662" y="452" class="body">and validation before publish.</text>
  <line x1="662" y1="488" x2="996" y2="488" class="line"/>
  <line x1="662" y1="532" x2="996" y2="532" class="line"/>
  <line x1="662" y1="576" x2="936" y2="576" class="line"/>
  <rect x="632" y="724" width="122" height="42" rx="13" class="soft"/>
  <text x="660" y="751" class="body">Preview</text>
  <rect x="772" y="724" width="154" height="42" rx="13" fill="#256D85"/>
  <text x="804" y="751" font-family="Arial" font-size="15" font-weight="700" fill="#FFFFFF">Save chapter</text>
  <text x="632" y="824" class="mono">last saved 12:44:03</text>

  <g filter="url(#shadow)">
    <rect x="1088" y="156" width="260" height="724" rx="22" class="surface"/>
  </g>
  <text x="1118" y="204" class="subhead">Live preview</text>
  <rect x="1118" y="236" width="200" height="284" rx="18" fill="#172029"/>
  <rect x="1144" y="266" width="148" height="184" rx="12" fill="#C9514C"/>
  <text x="1144" y="480" font-family="Arial" font-size="18" font-weight="800" fill="#FFFFFF">Vạn Cổ Thần Đế</text>
  <text x="1144" y="506" font-family="Arial" font-size="12" font-weight="600" fill="#B9C6CF">reader-facing preview</text>
  <text x="1118" y="570" class="label">PUBLISH CHECKS</text>
  <rect x="1118" y="596" width="200" height="46" rx="13" fill="#EAF6F0"/>
  <circle cx="1140" cy="619" r="6" class="green"/>
  <text x="1158" y="624" class="body">Story published_at</text>
  <rect x="1118" y="656" width="200" height="46" rx="13" fill="#FFF1EF"/>
  <circle cx="1140" cy="679" r="6" class="coral"/>
  <text x="1158" y="684" class="body">Cover missing alt</text>
  <rect x="1118" y="716" width="200" height="46" rx="13" fill="#EAF6F0"/>
  <circle cx="1140" cy="739" r="6" class="green"/>
  <text x="1158" y="744" class="body">Content present</text>
  <rect x="1118" y="800" width="200" height="44" rx="14" fill="#162029"/>
  <text x="1168" y="827" font-family="Arial" font-size="14" font-weight="700" fill="#FFFFFF">Open site</text>
</svg>
