<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">Admin Visual 01 Ruby Noir Dashboard V2</title>
  <desc id="desc">Full Ruby Noir admin dashboard redesigned from the provided admin-dashboard reference.</desc>
  <defs>
    <radialGradient id="bg" cx="70%" cy="0%" r="80%">
      <stop offset="0" stop-color="#43203A" stop-opacity=".58"/>
      <stop offset=".42" stop-color="#171119"/>
      <stop offset="1" stop-color="#090B11"/>
    </radialGradient>
    <linearGradient id="navActive" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7B2FE8"/>
      <stop offset="1" stop-color="#D94A64"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1D1B27"/>
      <stop offset="1" stop-color="#111620"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9D4DF5"/>
      <stop offset="1" stop-color="#622AE4"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F05D83"/>
      <stop offset="1" stop-color="#A12A46"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB23D"/>
      <stop offset="1" stop-color="#E45D36"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#51D392"/>
      <stop offset="1" stop-color="#209B65"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020308" flood-opacity=".42"/>
    </filter>
    <style>
      .title{font:800 24px Arial,sans-serif;fill:#FFF7FA}
      .h1{font:800 22px Arial,sans-serif;fill:#FFF7FA}
      .h2{font:800 15px Arial,sans-serif;fill:#FFF7FA}
      .body{font:600 13px Arial,sans-serif;fill:#E8E0E6}
      .small{font:500 11px Arial,sans-serif;fill:#A79BA5}
      .tiny{font:500 10px Arial,sans-serif;fill:#7E7480}
      .metric{font:800 25px Arial,sans-serif;fill:#FFF7FA}
      .mono{font:700 11px "Courier New",monospace;fill:#EEDFE7}
      .card{fill:url(#panel);stroke:#302A3C;stroke-width:1}
      .inner{fill:#141823;stroke:#2A2634;stroke-width:1}
      .grid{stroke:#2A2634;stroke-width:1;opacity:.8}
      .line{stroke:#302A3C;stroke-width:1}
      .ok{fill:#46C885}
      .pink{fill:#D94A64}
      .purple{fill:#8A36F2}
      .blue{fill:#3D9BE9}
      .amber{fill:#FFB23D}
    </style>
