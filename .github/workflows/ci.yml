name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci_publishable_key
      SUPABASE_SERVICE_ROLE_KEY: ci_service_role_key
      SUPABASE_SECRET_KEY: ci_service_role_key
      ADMIN_EMAILS: admin@example.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check text encoding
        run: npm run text:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --audit-level=high

  db-contracts:
    name: DB Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        run: npm run supabase:start

      - name: Reset local database
        run: npm run db:reset

      - name: Run SQL contract tests
        run: npm run db:test

      - name: Run Supabase advisors
        run: npx supabase db advisors --local --type all --level warn --fail-on error

      - name: Stop Supabase
        if: always()
        run: npm run supabase:stop
