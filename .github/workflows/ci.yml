name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci_publishable_key
      SUPABASE_SERVICE_ROLE_KEY: ci_service_role_key
      SUPABASE_SECRET_KEY: ci_service_role_key
      ADMIN_EMAILS: admin@example.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check text encoding
        run: npm run text:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --audit-level=high

  db-contracts:
    name: DB Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        run: npm run supabase:start

      - name: Reset local database
        run: npm run db:reset

      - name: Run SQL contract tests
        run: npm run db:test

      - name: Run Supabase advisors
        run: npx supabase db advisors --local --type all --level warn --fail-on error

      - name: Stop Supabase
        if: always()
        run: npm run supabase:stop

  admin-e2e-smoke:
    name: Admin E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      ADMIN_EMAILS: admin-shell@example.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start Supabase
        run: npm run supabase:start

      - name: Reset local database
        run: npm run db:reset

      - name: Export Supabase env
        shell: bash
        run: |
          status="$(npx supabase status -o env)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$(printf '%s\n' "$status" | sed -n 's/^API_URL="\([^"]*\)"/\1/p')"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$(printf '%s\n' "$status" | sed -n 's/^PUBLISHABLE_KEY="\([^"]*\)"/\1/p')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(printf '%s\n' "$status" | sed -n 's/^SERVICE_ROLE_KEY="\([^"]*\)"/\1/p')"
            echo "SUPABASE_SECRET_KEY=$(printf '%s\n' "$status" | sed -n 's/^SECRET_KEY="\([^"]*\)"/\1/p')"
          } >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Run admin smoke tests
        run: npx playwright test --grep @admin-smoke

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-admin-smoke
          path: |
            .tmp/playwright-results
            playwright-report
          if-no-files-found: ignore

      - name: Stop Supabase
        if: always()
        run: npm run supabase:stop
